name: Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Verify Bench Manifest (B3)
        env:
          NEMA_HWTEST_DISABLE_VITIS: "1"
          NEMA_HWTEST_DISABLE_VIVADO: "1"
        run: python -m nema bench verify benches/B3_kernel_302_7500/manifest.json
