name: Tests

on:
  push:
  pull_request:

env:
  CI_HW: ${{ vars.CI_HW || '0' }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Audit Gate (Software)
        run: python tools/audit_min.py --mode software

      - name: Verify Bench Manifest (B3)
        env:
          NEMA_HWTEST_DISABLE_VITIS: "1"
          NEMA_HWTEST_DISABLE_VIVADO: "1"
        run: python -m nema bench verify benches/B3_kernel_302_7500/manifest.json

  hardware-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Detect HW toolchain
        id: detect_hw
        shell: bash
        run: |
          if command -v vitis_hls >/dev/null 2>&1 || command -v vivado >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
          echo "CI_HW=${CI_HW:-0}"

      - name: Audit Gate (Hardware)
        if: steps.detect_hw.outputs.available == 'true' || env.CI_HW == '1'
        run: python tools/audit_min.py --mode hardware

      - name: Hardware Gate Skipped
        if: steps.detect_hw.outputs.available != 'true' && env.CI_HW != '1'
        run: |
          echo "Skipping hardware-gates: no vitis_hls/vivado in PATH and CI_HW!=1"
