name: Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Ruff lint
        run: uvx ruff@0.14.1 check . --config ruff.toml

      - name: Ruff format
        run: |
          uvx ruff@0.14.1 format --check \
            tools/update_sha256sums.py \
            tools/verify_paper_inputs.py \
            tools/sync_status_docs.py \
            tests/test_status_sync.py \
            tests/test_verify_paper_inputs.py

      - name: Mypy
        run: uvx mypy@1.11.2 --config-file mypy.ini

      - name: Bandit
        run: uvx --from "bandit[toml]==1.9.4" bandit -q -r nema tools/verify_paper_inputs.py tools/update_sha256sums.py -lll

      - name: pip-audit (dependencies)
        run: uvx pip-audit@2.10.0 -r requirements-dev.txt --skip-editable --progress-spinner off

      - name: Pytest (no HW/toolchain)
        run: uvx pytest@8.4.2 -q -m "not hw and not integration"
