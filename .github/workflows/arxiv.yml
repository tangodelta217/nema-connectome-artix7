name: arXiv Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  arxiv-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install TeX toolchain (pdflatex)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            lmodern

      - name: Build source-only arXiv bundle
        run: bash tools/build_arxiv_bundle.sh

      - name: Run arXiv structural preflight
        run: python tools/arxiv_preflight.py --bundle-dir build/arxiv_bundle_stage --main-rel paper/paper.tex

      - name: Verify tarball contract
        run: |
          test -f build/arxiv_bundle.tar.gz
          tar -tzf build/arxiv_bundle.tar.gz | sed 's#^\./##' | sed '/^$/d' | sed '/\/$/d' | sort -u > build/arxiv_bundle_ci.contents.txt
          grep -Fxq "paper/paper.tex" build/arxiv_bundle_ci.contents.txt
          grep -Fxq "00README.XXX" build/arxiv_bundle_ci.contents.txt
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            grep -Fxq "$file" build/arxiv_bundle_ci.contents.txt || { echo "Missing in tarball: $file"; exit 1; }
          done < build/arxiv_bundle.required_files.txt

      - name: Compile staged bundle with pdflatex (2-pass)
        run: |
          rm -rf build/arxiv_bundle_ci
          mkdir -p build/arxiv_bundle_ci
          tar -xzf build/arxiv_bundle.tar.gz -C build/arxiv_bundle_ci
          cd build/arxiv_bundle_ci/paper
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error paper.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error paper.tex
          test -f paper.pdf
